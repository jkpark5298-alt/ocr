<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>OCR 추출 웹앱</title>

  <meta name="theme-color" content="#f3f6fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="OCR 추출" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>OCR 추출 웹앱</h1>
      <p class="sub">
        아이폰 Safari에서 사진 촬영 또는 앨범 선택 후 OCR 추출이 가능합니다.
      </p>
    </section>

    <section class="card">
      <h2>1. 사진 선택</h2>

      <div class="btn-row">
        <label class="btn primary file-label">
          카메라 촬영
          <input id="cameraInput" type="file" accept="image/*" capture="environment" />
        </label>

        <label class="btn secondary file-label">
          사진 보관함 선택
          <input id="galleryInput" type="file" accept="image/*" />
        </label>
      </div>

      <div id="previewWrap" class="preview-wrap empty">
        <img id="preview" class="preview" alt="선택된 이미지 미리보기" />
        <div id="previewPlaceholder">아직 선택된 사진이 없습니다.</div>
      </div>
    </section>

    <section class="card">
      <h2>2. 검색 조건</h2>

      <div class="grid-2">
        <div class="field">
          <label for="searchType">검색 대상</label>
          <select id="searchType">
            <option value="name">이름(R/O L/D)</option>
            <option value="flightNo">편명</option>
            <option value="stand">주기장</option>
            <option value="raw" selected>원문 전체</option>
          </select>
        </div>

        <div class="field">
          <label for="searchValue">검색 값</label>
          <input
            id="searchValue"
            type="text"
            value="박종규"
            readonly
          />
        </div>
      </div>
