<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>OCR Flight Extract</title>
  <meta name="theme-color" content="#111827" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="OCR Flight" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <h1>OCR Flight Extract</h1>
      <p>아이폰에서 촬영 또는 앨범 사진으로 표를 읽고 이름별 편명/주기장을 추출합니다.</p>
    </header>

    <section class="card">
      <h2>1. 사진 선택</h2>
      <div class="btns">
        <label class="btn">
          카메라 촬영
          <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
        </label>
        <label class="btn secondary">
          사진 보관함 선택
          <input id="galleryInput" type="file" accept="image/*" hidden />
        </label>
      </div>
      <img id="preview" class="preview hidden" alt="preview" />
    </section>

    <section class="card">
      <h2>2. 검색 설정</h2>
      <div class="grid">
        <div>
          <label for="searchField">검색 대상</label>
          <select id="searchField">
            <option value="operator">이름(R/O L/D)</option>
            <option value="flightNo">편명</option>
            <option value="stand">주기장</option>
            <option value="raw">원문 전체</option>
          </select>
        </div>
        <div>
          <label for="searchValue">검색 값</label>
          <input id="searchValue" type="text" value="박종규" placeholder="예: 박종규, 이영식" />
        </div>
      </div>

      <div class="check-row">
        <label class="check-item"><input type="checkbox" class="col-check" value="flightNo" checked /> 편명</label>
        <label class="check-item"><input type="checkbox" class="col-check" value="operator" checked /> 이름(R/O L/D)</label>
        <label class="check-item"><input type="checkbox" class="col-check" value="stand" checked /> 주기장</label>
        <label class="check-item"><input type="checkbox" class="col-check" value="etd" /> ETD</label>
        <label class="check-item"><input type="checkbox" id="removeZero" checked /> 편명 0 제거</label>
      </div>

      <div class="btns">
        <button id="runBtn">OCR 실행</button>
        <button id="resetBtn" class="secondary">초기화</button>
      </div>
      <div id="status" class="status">대기 중</div>
    </section>

    <section class="card">
      <h2>3. 추출 결과</h2>
      <div class="table-wrap">
        <table id="resultTable">
          <thead><tr id="theadRow"></tr></thead>
          <tbody id="resultBody">
            <tr><td class="muted">아직 결과가 없습니다.</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>4. 복사용 출력</h2>
      <textarea id="copyOutput" rows="8" placeholder="OCR 결과가 여기 표시됩니다."></textarea>
      <div class="btns">
        <button id="copyBtn">복사</button>
        <button id="csvBtn" class="secondary">CSV 다운로드</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
